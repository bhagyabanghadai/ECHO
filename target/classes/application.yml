spring:
  application:
    name: echo-app
  
  # datasource configuration is handled by DatabaseConfig.java
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}
  
  web:
    resources:
      static-locations: classpath:/static/
  
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8080
  servlet:
    context-path: /
  
logging:
  level:
    com.echo: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info